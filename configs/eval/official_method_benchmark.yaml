method_set: official_compact
model_path: artifacts/models/ipn_c1t_tcn_full_validated.pkl
evaluation_manifest: data/interim/manifests/ipn_test_full_landmarks.jsonl
task_scenarios_path: configs/interaction/ar_task_scenarios.yaml
risk_costs_path: configs/interaction/action_risk_costs.yaml
output_report: artifacts/reports/official_method_benchmark.json
seed: 20260528
num_trials_per_task: 8
idle_distractors_per_gap: 1
bootstrap_iterations: 1000

hybrid:
  neural_weight: 0.96
  geometry_weight: 0.08
  enable_safety_gate: true
  action_threshold: 0.44
  no_gesture_margin: 0.03
  low_quality_confidence: 0.42
  low_quality_no_gesture_boost: 0.12
  weak_motion_no_gesture_boost: 0.06
  swipe_motion_min: 0.055
  zoom_delta_min: 0.035
  click_distance_max: 0.075

c6:
  model_paths:
    - artifacts/models/ipn_c1t_tcn_full_validated.pkl
    - artifacts/models/ipn_c1t_tcn_augmented.pkl
  hybrid:
    neural_weight: 0.96
    geometry_weight: 0.08
    enable_safety_gate: true
    action_threshold: 0.44
    no_gesture_margin: 0.03
    low_quality_confidence: 0.42
    low_quality_no_gesture_boost: 0.12
    weak_motion_no_gesture_boost: 0.06
    swipe_motion_min: 0.055
    zoom_delta_min: 0.035
    click_distance_max: 0.075
  calibration:
    c3_weight: 0.15
    temperature: 1.25
    min_action_confidence: 0.0
    min_action_margin: 0.0
    label_biases:
      click_2f: 0.18
      no_gesture: 0.12
      swipe_left: 0.0
      zoom_in: 0.0
      zoom_out: 0.22

c4_task_aware_policy:
  base:
    default_threshold: 0.52
    label_thresholds:
      point_2f: 0.46
      click_2f: 0.54
      swipe_left: 0.54
      swipe_right: 0.54
      zoom_in: 0.54
      zoom_out: 0.54
    default_stable_frames: 1
    label_stable_frames:
      click_2f: 1
      swipe_left: 1
      swipe_right: 1
      zoom_in: 1
      zoom_out: 1
    cooldown_ms: 250
    no_gesture_reset_frames: 3
    min_score_margin: 0.0
  expected_threshold_delta: -0.08
  unexpected_threshold_delta: 0.18
  idle_threshold_delta: 0.22
  expected_stable_frames: 1

policy_frames_per_clip: 3
policy_frame_step_ms: 100
policy_reset_frames: 3
policy_reset_step_ms: 90

evaluation_scenarios:
  - name: clean
    kind: clean
  - name: noise_mild
    kind: gaussian_noise
    sigma: 0.006
  - name: frame_drop_30
    kind: frame_drop
    drop_rate: 0.30
  - name: landmark_mask_20
    kind: landmark_mask
    mask_rate: 0.20
  - name: combined_mild
    kind: combined
    sigma: 0.004
    drop_rate: 0.10
    mask_rate: 0.06
