model_paths:
  - artifacts/models/ipn_c1t_tcn_full_validated.pkl
  - artifacts/models/ipn_c1t_tcn_augmented.pkl
calibration_manifest: data/interim/manifests/ipn_train_full_landmarks.jsonl
evaluation_manifest: data/interim/manifests/ipn_test_full_landmarks.jsonl
seed: 20260528
max_calibration_records: 896
output_report: artifacts/reports/c6_ensemble_calibrated_recognition.json

hybrid:
  neural_weight: 0.94
  geometry_weight: 0.06
  enable_safety_gate: true
  action_threshold: 0.46
  no_gesture_margin: 0.03
  low_quality_confidence: 0.42
  low_quality_no_gesture_boost: 0.12
  weak_motion_no_gesture_boost: 0.06
  swipe_motion_min: 0.055
  zoom_delta_min: 0.035
  click_distance_max: 0.075

calibration_scenarios:
  - name: clean
    kind: clean
  - name: noise_mild
    kind: gaussian_noise
    sigma: 0.006
  - name: combined_mild
    kind: combined
    sigma: 0.004
    drop_rate: 0.10
    mask_rate: 0.06

evaluation_scenarios:
  - name: clean
    kind: clean
  - name: noise_mild
    kind: gaussian_noise
    sigma: 0.006
  - name: noise_strong
    kind: gaussian_noise
    sigma: 0.014
  - name: frame_drop_30
    kind: frame_drop
    drop_rate: 0.30
  - name: landmark_mask_20
    kind: landmark_mask
    mask_rate: 0.20
  - name: temporal_jitter_2
    kind: temporal_jitter
    jitter: 2
  - name: combined_mild
    kind: combined
    sigma: 0.004
    drop_rate: 0.10
    mask_rate: 0.06

objective:
  weak_labels: [click_2f, swipe_left, zoom_out]
  weak_f1_weight: 0.05
  false_action_penalty: 0.20

grid:
  c3_weight: [0.0, 0.15, 0.35, 0.55, 0.80]
  temperature: [0.80, 1.00, 1.25]
  min_action_confidence: [0.0, 0.48, 0.56]
  min_action_margin: [0.0, 0.03]
  label_biases:
    no_gesture: [-0.15, 0.0, 0.12]
    click_2f: [0.0, 0.18]
    swipe_left: [0.0, 0.22, 0.40]
    zoom_out: [0.0, 0.22, 0.40]
    zoom_in: [-0.08, 0.0]
